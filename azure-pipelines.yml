                    $el = $doc.CreateElement("environmentVariable")
                    $el.SetAttribute("name", $name)
                    $el.SetAttribute("value", $value)
                    $parent.AppendChild($el) | Out-Null
                  }
                }

                Set-EnvVar $xml $envVars "ASPNETCORE_ENVIRONMENT" "$(aspnetcore.environment)"
                Set-EnvVar $xml $envVars "ASPNETCORE_HTTPS_PORT"  "443"

                $xml.Save($webConfig)
                Write-Host "web.config updated — ASPNETCORE_ENVIRONMENT=$(aspnetcore.environment), HTTPS_PORT=443"

          - task: IISWebAppManagementOnMachineGroup@0
            displayName: 'Stop IIS site'
            inputs:
              IISDeploymentType: IISWebsite
              ActionIISWebsite: StopWebsite
              StartStopWebsiteName: '$(iis.siteName)'
            continueOnError: true

          - task: CopyFiles@2
            displayName: 'Copy files to IIS directory'
            inputs:
              SourceFolder: '$(Pipeline.Workspace)/drop'
              TargetFolder: '$(iis.physicalPath)'
              CleanTargetFolder: true

          - task: IISWebAppManagementOnMachineGroup@0
            displayName: 'Start IIS site'
            inputs:
              IISDeploymentType: IISWebsite
              ActionIISWebsite: StartWebsite
              StartStopWebsiteName: '$(iis.siteName)'
