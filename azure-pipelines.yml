trigger:
  branches:
    include:
      - main


pool:
  name: Default          # on-premises Azure DevOps 2022 agent pool; adjust to your pool name

variables:
  buildConfiguration: Release
  solution: 'XTMon.sln'
  testProject: 'tests/XTMon.Tests/XTMon.Tests.csproj'
  mainProject: 'src/XTMon/XTMon.csproj'

stages:

# ─── Stage 1: Build & Test ────────────────────────────────────────────────────
- stage: BuildAndTest
  displayName: 'Build & Test'
  jobs:

  - job: Build
    displayName: 'Restore · Build · Test · Publish'
    steps:

    # ── Verify .NET SDK is available on the agent ──────────────────────────────
    # No UseDotNet@2 — the agent has no internet access.
    # .NET 10 SDK must be pre-installed on the build agent.
    - script: dotnet --version
      displayName: 'Verify .NET SDK version'

    - script: |
        dotnet --list-sdks
        dotnet --info
      displayName: 'Print .NET SDK details'

    # ── Restore ───────────────────────────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Restore packages'
      inputs:
        command: restore
        projects: $(solution)
        # If using an internal NuGet feed add:
        # feedsToUse: select
        # vstsFeed: '<your-feed-guid-or-name>'

    # ── Build (entire solution — ensures test project is also built) ──────────
    - task: DotNetCoreCLI@2
      displayName: 'Build $(buildConfiguration)'
      inputs:
        command: build
        projects: $(solution)
        arguments: '--no-restore --configuration $(buildConfiguration)'

    # ── Test ──────────────────────────────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Run unit tests'
      inputs:
        command: test
        projects: $(testProject)
        arguments: '--no-build --configuration $(buildConfiguration) --collect:"XPlat Code Coverage"'
        publishTestResults: true

    # ── Publish code coverage report ──────────────────────────────────────────
    - task: PublishCodeCoverageResults@1
      displayName: 'Publish code coverage'
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'
      condition: succeededOrFailed()

    # ── Publish app ───────────────────────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Publish app'
      inputs:
        command: publish
        projects: $(mainProject)
        arguments: '--no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/app'
        zipAfterPublish: false
        modifyOutputPath: false

    # ── Upload artifact ───────────────────────────────────────────────────────
    - task: PublishBuildArtifacts@1
      displayName: 'Upload artifact: drop'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app'
        ArtifactName: drop
        publishLocation: Container

# ─── Stage 2: Deploy to Staging ──────────────────────────────────────────────
# IIS site must already exist with HTTPS 443 binding and certificate configured.
- stage: DeployStaging
  displayName: 'Deploy to Staging'
  dependsOn: BuildAndTest
  variables:
  - group: XTMon-Staging          # Variable group with ConnectionStrings.*, etc.
  - name: iis.siteName
    value: 'XTMon-Staging'
  - name: iis.physicalPath
    value: 'C:\inetpub\XTMon-Staging'
  - name: aspnetcore.environment
    value: 'Staging'
  jobs:

  - deployment: DeployToStaging
    displayName: 'Deploy to Staging IIS'
    environment: 'Staging'        # Create this environment in Azure DevOps
    strategy:
      runOnce:
        deploy:
          steps:

          # ── Transform appsettings.json with pipeline variables ─────────
          # Variables named with dot-notation (e.g. ConnectionStrings.LogFiAlmt)
          # automatically replace matching keys in the JSON file.
          - task: FileTransform@2
            displayName: 'Apply environment config'
            inputs:
              folderPath: '$(Pipeline.Workspace)/drop'
              jsonTargetFiles: 'appsettings.json'

          # ── Configure web.config for HTTPS 443 ────────────────────────
          # Sets ASPNETCORE_ENVIRONMENT and ASPNETCORE_HTTPS_PORT.
          # IIS manages the HTTPS binding and certificate; the app only
          # needs the port hint for correct redirect URLs.
          - task: PowerShell@2
            displayName: 'Configure web.config environment variables'
            inputs:
              targetType: inline
              script: |
                $webConfig = "$(Pipeline.Workspace)/drop/web.config"
                [xml]$xml = Get-Content $webConfig

                # Ensure <environmentVariables> node exists
                $envVars = $xml.SelectSingleNode("//environmentVariables")
                if (-not $envVars) {
                  $aspNetCore = $xml.SelectSingleNode("//aspNetCore")
                  $envVars = $xml.CreateElement("environmentVariables")
                  $aspNetCore.AppendChild($envVars) | Out-Null
                }

                # Upsert helper — creates or updates an environment variable
                function Set-EnvVar([xml]$doc, $parent, [string]$name, [string]$value) {
                  $node = $doc.SelectSingleNode("//environmentVariable[@name='$name']")
                  if ($node) {
                    $node.SetAttribute("value", $value)
                  } else {
                    $el = $doc.CreateElement("environmentVariable")
                    $el.SetAttribute("name", $name)
                    $el.SetAttribute("value", $value)
                    $parent.AppendChild($el) | Out-Null
                  }
                }

                Set-EnvVar $xml $envVars "ASPNETCORE_ENVIRONMENT" "$(aspnetcore.environment)"
                Set-EnvVar $xml $envVars "ASPNETCORE_HTTPS_PORT"  "443"

                $xml.Save($webConfig)
                Write-Host "web.config updated — ASPNETCORE_ENVIRONMENT=$(aspnetcore.environment), HTTPS_PORT=443"

          # ── Stop IIS site, deploy, start ──────────────────────────────
          - task: IISWebAppManagementOnMachineGroup@0
            displayName: 'Stop IIS site'
            inputs:
              IISDeploymentType: IISWebsite
              ActionIISWebsite: StopWebsite
              StartStopWebsiteName: '$(iis.siteName)'
            continueOnError: true

          - task: CopyFiles@2
            displayName: 'Copy files to IIS directory'
            inputs:
              SourceFolder: '$(Pipeline.Workspace)/drop'
              TargetFolder: '$(iis.physicalPath)'
              CleanTargetFolder: true

          - task: IISWebAppManagementOnMachineGroup@0
            displayName: 'Start IIS site'
            inputs:
              IISDeploymentType: IISWebsite
              ActionIISWebsite: StartWebsite
              StartStopWebsiteName: '$(iis.siteName)'

# ─── Stage 3: Deploy to Production ──────────────────────────────────────────
# IIS site must already exist with HTTPS 443 binding and certificate configured.
- stage: DeployProd
  displayName: 'Deploy to Production'
  dependsOn: DeployStaging
  variables:
  - group: XTMon-Prod             # Variable group with ConnectionStrings.*, etc.
  - name: iis.siteName
    value: 'XTMon'
  - name: iis.physicalPath
    value: 'C:\inetpub\XTMon'
  - name: aspnetcore.environment
    value: 'Production'
  jobs:

  - deployment: DeployToProd
    displayName: 'Deploy to Production IIS'
    environment: 'Production'     # Create this environment in Azure DevOps (add approval gate)
    strategy:
      runOnce:
        deploy:
          steps:

          - task: FileTransform@2
            displayName: 'Apply environment config'
            inputs:
              folderPath: '$(Pipeline.Workspace)/drop'
              jsonTargetFiles: 'appsettings.json'

          - task: PowerShell@2
            displayName: 'Configure web.config environment variables'
            inputs:
              targetType: inline
              script: |
                $webConfig = "$(Pipeline.Workspace)/drop/web.config"
                [xml]$xml = Get-Content $webConfig

                $envVars = $xml.SelectSingleNode("//environmentVariables")
