trigger:
  branches:
    include:
      - main

pool:
  name: Default          # on-premises Azure DevOps 2022 agent pool; adjust to your pool name

variables:
  buildConfiguration: Release
  dotnetVersion: '10.0.x'
  testProject: 'XTMon.Tests/XTMon.Tests.csproj'
  mainProject: 'XTMon.csproj'

stages:

# ─── Stage 1: Build & Test ────────────────────────────────────────────────────
- stage: BuildAndTest
  displayName: 'Build & Test'
  jobs:

  - job: Build
    displayName: 'Restore · Build · Test · Publish'
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET $(dotnetVersion)'
      inputs:
        packageType: sdk
        version: $(dotnetVersion)

    # ── Restore ───────────────────────────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Restore packages'
      inputs:
        command: restore
        projects: '**/*.csproj'
        # If using an internal NuGet feed add:
        # feedsToUse: select
        # vstsFeed: '<your-feed-guid-or-name>'

    # ── Build (main project only — Release) ───────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Build $(buildConfiguration)'
      inputs:
        command: build
        projects: $(mainProject)
        arguments: '--no-restore --configuration $(buildConfiguration)'

    # ── Test (Debug build keeps symbols for coverage) ─────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Run unit tests'
      inputs:
        command: test
        projects: $(testProject)
        arguments: >-
          --no-restore
          --configuration Debug
          --collect:"XPlat Code Coverage"
          --results-directory $(Agent.TempDirectory)/TestResults
          --logger trx
        publishTestResults: true

    # ── Publish code coverage report ──────────────────────────────────────────
    - task: PublishCodeCoverageResults@2
      displayName: 'Publish code coverage'
      inputs:
        summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'
      condition: succeededOrFailed()

    # ── Publish app ───────────────────────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Publish app'
      inputs:
        command: publish
        projects: $(mainProject)
        arguments: '--no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/app'
        zipAfterPublish: false
        modifyOutputPath: false

    # ── Upload artifact ───────────────────────────────────────────────────────
    - task: PublishBuildArtifacts@1
      displayName: 'Upload artifact: drop'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app'
        ArtifactName: drop
        publishLocation: Container
