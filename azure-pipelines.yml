trigger:
  branches:
    include:
      - main

pool:
  name: Default          # on-premises Azure DevOps 2022 agent pool; adjust to your pool name

variables:
  buildConfiguration: Release
  solution: 'XTMon.sln'
  testProject: 'tests/XTMon.Tests/XTMon.Tests.csproj'
  mainProject: 'src/XTMon/XTMon.csproj'

stages:

# ─── Stage 1: Build & Test ────────────────────────────────────────────────────
- stage: BuildAndTest
  displayName: 'Build & Test'
  jobs:

  - job: Build
    displayName: 'Restore · Build · Test · Publish'
    steps:

    # ── Verify .NET SDK is available on the agent ──────────────────────────────
    # No UseDotNet@2 — the agent has no internet access.
    # .NET 10 SDK must be pre-installed on the build agent.
    - script: dotnet --version
      displayName: 'Verify .NET SDK version'

    # ── Restore ───────────────────────────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Restore packages'
      inputs:
        command: restore
        projects: $(solution)
        # If using an internal NuGet feed add:
        # feedsToUse: select
        # vstsFeed: '<your-feed-guid-or-name>'

    # ── Build (entire solution — ensures test project is also built) ──────────
    - task: DotNetCoreCLI@2
      displayName: 'Build $(buildConfiguration)'
      inputs:
        command: build
        projects: $(solution)
        arguments: '--no-restore --configuration $(buildConfiguration)'

    # ── Test ──────────────────────────────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Run unit tests'
      inputs:
        command: test
        projects: $(testProject)
        arguments: >-
          --no-build
          --configuration $(buildConfiguration)
          --collect:"XPlat Code Coverage"
          --results-directory $(Agent.TempDirectory)/TestResults
          --logger trx
        publishTestResults: true

    # ── Publish code coverage report ──────────────────────────────────────────
    - task: PublishCodeCoverageResults@1
      displayName: 'Publish code coverage'
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'
      condition: succeededOrFailed()

    # ── Publish app ───────────────────────────────────────────────────────────
    - task: DotNetCoreCLI@2
      displayName: 'Publish app'
      inputs:
        command: publish
        projects: $(mainProject)
        arguments: '--no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/app'
        zipAfterPublish: false
        modifyOutputPath: false

    # ── Upload artifact ───────────────────────────────────────────────────────
    - task: PublishBuildArtifacts@1
      displayName: 'Upload artifact: drop'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/app'
        ArtifactName: drop
        publishLocation: Container
